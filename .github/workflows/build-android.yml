name: Build Android APK

on:
  push:
    branches: [ main ]
  release:
    types: [ published ]

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build APK with Buildozer
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            libffi-dev \
            libssl-dev \
            python3-pip \
            python3-dev
      
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer cython
      
      - name: Create buildozer.spec if not exists
        run: |
          if [ ! -f buildozer.spec ]; then
            buildozer init
            echo "buildozer.spec created"
          fi
      
      - name: Configure buildozer.spec for this project
        run: |
          # Este paso ajusta el buildozer.spec para que coincida con tu proyecto
          # Asumimos que el punto de entrada es el archivo principal de Python
          sed -i 's/^#.*source.include_exts.*/source.include_exts = py,png,jpg,kv,atlas/' buildozer.spec
          sed -i 's/^#.*source.include_dirs.*/source.include_dirs = ./' buildozer.spec
          sed -i 's/^#.*requirements.*/requirements = python3,kivy,requests,bs4,flask/' buildozer.spec
          sed -i 's/^#.*permissions.*/permissions = INTERNET/' buildozer.spec
      
      - name: Build APK
        run: |
          buildozer android debug deploy run
      
      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Diabolic-Peninsular-APK
          path: bin/*.apk
      
      - name: Upload APK to Release
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: bin/*.apk
          asset_name: Diabolic-Peninsular.apk
          asset_content_type: application/vnd.android.package-archive
