name: Build Android APK with Docker

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build APK with Docker
        run: |
          docker run --rm \
            -v $(pwd):/app \
            -w /app \
            kivy/buildozer \
            buildozer android debug deploy run
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Diabolic-APK
          path: bin/*.apk
